<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notes App - Versi HTML Statis</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.08); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #333; margin-bottom: 20px; font-size: 24px; }
        .input-group { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        button { background-color: #2ecc71; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #27ae60; }
        ul { list-style: none; padding: 0; text-align: left; }
        li { background: #f9f9f9; padding: 12px; border-radius: 6px; margin-bottom: 8px; border-left: 5px solid #2ecc71; display: flex; justify-content: space-between; align-items: center; font-size: 15px; }
        .delete-btn { background-color: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .delete-btn:hover { background-color: #c0392b; }
        .tag { font-size: 11px; color: #7f8c8d; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📝 Notes App (HTML Statis)</h1>
        <div class="input-group">
            <input type="text" id="noteInput" placeholder="Tulis catatan baru...">
            <button onclick="addNote()">Tambah</button>
        </div>
        <ul id="notesList"></ul>
    </div>

    <script>
        // Mengambil data dari localStorage browser
        let notes = JSON.parse(localStorage.getItem('static_notes')) || [];

        function renderNotes() {
            const list = document.getElementById('notesList');
            list.innerHTML = '';
            notes.forEach((note, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span>${note}</span>
                    <button class="delete-btn" onclick="deleteNote(${index})">Hapus</button>
                `;
                list.appendChild(li);
            });
            localStorage.setItem('static_notes', JSON.stringify(notes));
        }

        function addNote() {
            const input = document.getElementById('noteInput');
            if (input.value.trim() !== '') {
                notes.push(input.value.trim());
                input.value = '';
                renderNotes();
            }
        }

        function deleteNote(index) {
            notes.splice(index, 1);
            renderNotes();
        }

        renderNotes();
    </script>
</body>
</html>
